<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="geminiGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c8a84b"/>
      <stop offset="0.5" stop-color="#feca57"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  
  <!-- "Chubby" Sparkle Shape to match Gemini's visual weight -->
