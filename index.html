<!DOCTYPE html>
<html lang="tr" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gelişmiş RSS akış okuyucu, birden fazla kaynağı tek panelde takip edin.">
  <meta name="theme-color" content="#07090c" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#faf9f6" media="(prefers-color-scheme: light)">
  <title>RSS Feeder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <script src="https://cdn.jsdelivr.net/npm/rss-parser@3.13.0/dist/rss-parser.min.js" integrity="sha256-Ff8aHU/dNcvSD0QMJlkzPhU6h04FDJh9M7fbAFxQ2Z8=" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="themeTransition"></div>
  <header>
    <div style="display: flex; align-items: center; gap: 8px;">
      <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMobileSidebar()">
        <svg viewBox="0 0 24 24">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
      <div class="logo-wrap">
        <div class="modern-radar">
          <div class="radar-sweep-container">
            <div class="radar-sweep"></div>
          </div>
          <div class="radar-core"></div>
          <div class="radar-ring r1"></div>
          <div class="radar-ring r2"></div>
          <div class="radar-blip b1"></div>
          <div class="radar-blip b2"></div>
        </div>
        <div class="logo-text">RSS FEEDER</div>
      </div>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Haberlerde ara..."
        oninput="handleSearch(this.value)">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
    <div class="header-right">
      <div class="brand-time-wrap">
        <div class="header-clock" id="headerClock">00:00:00</div>
        <div class="header-date" id="headerDate">01.01.2026</div>
      </div>
      <div class="k4satura-brand">K4SATURA</div>
      <button class="btn-theme" onclick="toggleTheme(event)" title="Tema değiştir">
        <svg class="icon-moon" viewBox="0 0 24 24">
          <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" />
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
      </button>
      <button class="btn-manage" onclick="openModal()">
        <svg viewBox="0 0 24 24">
          <path d="M12 5v14M5 12h14" stroke-linecap="square" />
        </svg>
        KAYNAKLAR
      </button>
    </div>
  </header>
  <div class="main-wrap">
    <aside class="sidebar">
      <div class="all-feeds-wrap">
        <div class="all-feeds-btn" id="btnAllFeeds" onclick="renderArticles('all'); closeMobileSidebar();">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
          </svg>
          TÜM HABERLER
        </div>
        <div class="all-feeds-btn" id="btnSaved" style="margin-top: 8px;"
          onclick="renderArticles('saved'); closeMobileSidebar();">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
          </svg>
          KAYDEDİLENLER
        </div>
      </div>
      <div class="sidebar-label">
        <span>KAYNAKLAR</span>
        <span id="feedCountLabel">0</span>
      </div>
      <div id="sidebarFeeds"></div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>
    <main class="content">
      <div class="content-header">
        <div>
          <div class="feed-title" id="activeFeedTitle">TÜM HABERLER</div>
          <div style="display: flex; align-items: center; gap: 10px;">
            <div class="feed-count" id="articleCount"></div>
            <label class="feed-count btn-unread-toggle" id="unreadToggleLabel" title="Sadece okunmamışları göster">
              <input type="checkbox" id="unreadToggle" style="display: none;"
                onchange="toggleUnreadFilter(this.checked)">
              <svg viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke-linejoin="round" stroke-linecap="round" />
                <circle cx="12" cy="12" r="3" stroke-linejoin="round" stroke-linecap="round" />
              </svg>
              <span id="unreadLabel">TÜMÜ</span>
            </label>
          </div>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
          <div class="feed-count" id="readCounter" title="Okunan haber sayısı">
            <svg viewBox="0 0 24 24">
              <path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span id="readCountLabel">0</span>
          </div>
          <div class="feed-count" id="autoRefreshCounter" title="Otomatik yenileme süresi">05:00</div>
          <button class="btn-refresh" id="refreshBtn" onclick="manualRefresh()">
            <svg viewBox="0 0 24 24">
              <path
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
                stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            YENİLE
          </button>
        </div>
      </div>
      <div class="news-grid" id="newsGrid"></div>
    </main>
  </div>
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">KAYNAK YÖNETİMİ</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="add-form">
          <div class="feed-list-label">
            <span>KAYNAK EKLE</span>
          </div>
          <div class="form-row">
            <input type="text" class="form-input" id="newFeedName" placeholder="Kaynak adını girin.">
            <div style="width: 90px; flex-shrink: 0;"></div>
          </div>
          <div class="form-row">
            <input type="text" class="form-input" id="newFeedUrl" placeholder="RSS bağlantısı girin.">
            <button class="btn-add" id="btnAddFeed" onclick="addFeed()" style="width: 90px; flex-shrink: 0;">EKLE</button>
          </div>
        </div>
        <div class="lists-section" style="margin-top: 24px;">
          <div class="feed-list-label">
            <span>LİSTELER</span>
          </div>
          <div class="form-row-group">
            <div class="form-row">
              <div class="custom-select-wrapper" id="listSelectWrapper">
                <div class="custom-select-trigger">
                  <span id="listSelectTriggerText">Bir liste seçin...</span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M6 9l6 6 6-6" />
                  </svg>
                </div>
                <div class="custom-options" id="listOptions">
                </div>
              </div>
              <button class="btn-add" id="btnDeleteList" onclick="deleteSelectedList()"
                style="display: none;">SİL</button>
              <div id="listSelectSpacer" style="width: 90px; flex-shrink: 0;"></div>
            </div>
            <div class="form-row">
              <input type="text" class="form-input" id="newListName" placeholder="Listenizin adını girin.">
              <button class="btn-add" onclick="saveCurrentAsList()" style="width: 90px; flex-shrink: 0;">KAYDET</button>
            </div>
          </div>
        </div>
        <div class="feed-list-label" style="margin-top: 24px;">
          <span>Kaynaklar</span>
        </div>
        <div id="modalFeedList"></div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast">
    <div class="toast-body">
      <div class="toast-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path id="toastIconPath" d="M20 6L9 17L4 12" />
        </svg>
      </div>
      <div class="toast-content">
        <div class="toast-message" id="toastMsg"></div>
      </div>
    </div>
    <div class="toast-progress">
      <div class="toast-progress-bar" id="toastProgressBar"></div>
    </div>
  </div>
  <script src="feeds.js"></script>
  <script src="main.js"></script>
</body>

</html>
